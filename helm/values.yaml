# =============================================================================
# ai-o11y-demo-apps Helm values
# =============================================================================
# All credentials (Sigil, OTel, Anthropic, OpenAI, Gemini) should be supplied
# via a generated values-overrides file (see tools/install.sh) — never commit
# real keys here. Everything below is either non-secret defaults or empty
# placeholders.

global:
  # Container image registry + tag. Per-component image names are computed
  # from this in templates/_helpers.tpl.
  image:
    registry: ghcr.io/stephenwagner-grafana/ai-o11y-demo-apps
    tag: latest
    # Always pull because we publish on :latest from main; without this,
    # k3s caches the first :latest it sees and never picks up image fixes.
    # Switch to IfNotPresent if you pin to a :sha-... tag.
    pullPolicy: Always

  # Service identity (resource attribute on every OTel signal)
  serviceNamespace: ai-o11y-demo-apps

  # Provider credentials — populated by install.sh from the user-supplied .env
  anthropic:
    apiKey: ""           # required — CLAUDE_API_KEY
  openai:
    apiKey: ""           # optional
  gemini:
    apiKey: ""           # optional
  ollama:
    baseUrl: ""          # optional — e.g. http://ollama.ollama.svc.cluster.local:11434

  # Per-provider caps (drive the gateway /open endpoint)
  caps:
    anthropic:
      usdPerDay: 20
    openai:
      usdPerDay: 5
    gemini:
      usdPerDay: 5
    ollama:
      gpuUtilizationThreshold: 0.85

  # Default model per provider (used when modelWeights is empty)
  defaults:
    anthropicModel: claude-haiku-4-5-20251001
    openaiModel: gpt-4o-mini
    geminiModel: gemini-1.5-flash
    ollamaModel: qwen2.5:14b

  # Weighted model pools. The provider picks one model per request — sticky by
  # (session_id + conversation_id) so a single conversation stays on one model
  # end-to-end (better UX, cleaner per-model dashboard slices).
  #
  # Format: "model_a:weight_a,model_b:weight_b,..." (weights are relative and
  # normalized to 1.0 by the gateway — they need not sum to anything specific).
  #
  # Anthropic default below: a mixed Claude pool that biases hard toward
  # cheap/fast Haiku, sprinkles in Sonnet, and keeps Opus rare (Opus has tight
  # rate limits + ~25x the cost of Haiku). Target distribution:
  #   Haiku 4.5  — 55% (workhorse)
  #   Sonnet 4.5 — 12% (mid-tier, common)
  #   Sonnet 4.6 — 23% (latest sonnet, the headline mid-tier model)
  #   Opus 4.7   —  5% (latest opus, rare)
  #   Opus 4.6   —  3% (rare)
  #   Opus 4.1   —  2% (very rare, mostly for label diversity)
  #
  # Override at install time via the `ANTHROPIC_MODEL_WEIGHTS` env var (see
  # tools/install.sh — picked up into .helm-values-overrides.yaml), or edit
  # this file directly. Set to "" to fall back to global.defaults.anthropicModel.
  #
  # Model ID certainty (as of 2026-05-22):
  #   KNOWN-good (also in gateway/config/pricing.yaml):
  #     claude-haiku-4-5-20251001, claude-sonnet-4-6, claude-opus-4-7
  #   PRESUMED (Anthropic's undated snapshot form for newer models; if the
  #   gateway logs a 400 "model not found" for any of these, replace with
  #   the dated form like claude-opus-4-1-YYYYMMDD or comment it out):
  #     claude-sonnet-4-5, claude-opus-4-6, claude-opus-4-1
  #
  # Ollama default below: a 4-model weighted pool spanning the practical
  # parameter-count range customers see on a single-GPU box. Mixing sizes
  # gives the demo visible model variety (different latency/cost/quality
  # tiers showing up as distinct slices in dashboards) without leaving
  # the qwen2.5 family except for one llama3.1 entry that adds vendor
  # diversity in the model-name label. Target distribution:
  #   qwen2.5:3b   — 25% (small, fast feedback, ~2GB VRAM)
  #   qwen2.5:7b   — 30% (medium workhorse)
  #   llama3.1:8b  — 25% (medium, different family — vendor diversity)
  #   qwen2.5:14b  — 20% (large, slower, equals previous default)
  #
  # REQUIREMENTS:
  #   * The customer's Ollama server (OLLAMA_BASE_URL) must have ALL FOUR
  #     models pulled in advance. `ollama pull qwen2.5:3b` etc. The gateway
  #     does NOT auto-pull; a missing model returns a 404 from Ollama and
  #     the gateway propagates it as a 500 to the caller (no in-process
  #     fallback to a different weight bucket). To recover, either pull
  #     the missing model or remove its entry from this weighted string.
  #   * All four are tool-capable (qwen2.5 family across all sizes,
  #     llama3.1:8b). DO NOT add tinyllama / llama3.2:1b|3b / gemma2 —
  #     they 400 with "does not support tools" on tool-using prompts.
  #     (The provider retries once WITHOUT tools on that 400, but the
  #     specialist's expected tool call is then lost, which corrupts the
  #     demo flow.)
  #
  # Override at install time via the `OLLAMA_MODEL_WEIGHTS` env var (see
  # tools/install.sh — picked up into .helm-values-overrides.yaml), or
  # edit this file directly. Set to "" to fall back to
  # global.defaults.ollamaModel.
  modelWeights:
    anthropic: "claude-haiku-4-5-20251001:55,claude-sonnet-4-6:23,claude-sonnet-4-5:12,claude-opus-4-7:5,claude-opus-4-6:3,claude-opus-4-1:2"
    openai: ""
    gemini: ""
    ollama: "qwen2.5:3b:25,qwen2.5:7b:30,llama3.1:8b:25,qwen2.5:14b:20"

  # Cross-provider weighting for synthetic loadgen traffic. Tilts toward
  # Ollama by default (it's ~200x cheaper than Anthropic on the dollar metric)
  # so the demo doesn't burn cloud credits during long-running sessions.
  # Customers with only Anthropic configured are unaffected — Ollama isn't
  # open, so its weight share gets dropped and Anthropic captures all
  # synthetic traffic.
  # Interactive traffic (no synthetic header) is always Anthropic regardless.
  #
  # Format mirrors the per-provider weights above:
  #   "anthropic:1,ollama:2"   ollama ~67%, anthropic ~33%   (DEFAULT)
  #   "anthropic:1,ollama:1"   uniform 50/50
  #   "anthropic:3,ollama:1"   anthropic-heavy (~75/25)
  #   ""                       uniform fallback
  #
  # Override at install time via PROVIDER_WEIGHTS env var in .env.
  providerWeights: "anthropic:1,ollama:2"

  # Sigil credentials (required — populated by install.sh)
  sigil:
    endpoint: ""         # SIGIL_ENDPOINT
    protocol: http       # SIGIL_PROTOCOL
    authMode: basic      # SIGIL_AUTH_MODE
    tenantId: ""         # SIGIL_AUTH_TENANT_ID
    token: ""            # SIGIL_AUTH_TOKEN

  # OTel OTLP credentials (required — populated by install.sh)
  otel:
    endpoint: ""         # OTEL_EXPORTER_OTLP_ENDPOINT
    headers: ""          # OTEL_EXPORTER_OTLP_HEADERS  (Authorization=Basic <base64>)

# =============================================================================
# Postgres — shared by NeonCart (catalog) + SupportBot (RAG vector store)
# Lives in the `ai-o11y-postgres` namespace.
# =============================================================================
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  storage:
    size: 1Gi
    storageClass: ""     # empty = use cluster default
  database: aio11y
  user: aio11y
  password: ""           # leave empty; install.sh generates random
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Seed Job (one-shot, runs after Postgres is Ready)
  seedJob:
    enabled: true

# =============================================================================
# LLM Gateway — the gatekeeper. Lives in `llm-gateway` namespace.
# =============================================================================
gateway:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Pricing overrides — empty means use config/pricing.yaml shipped in the image
  pricingOverrides: {}

# =============================================================================
# NeonCart — `neoncart` namespace
# =============================================================================
neoncart:
  web:
    enabled: true
    replicas: 1
    resources:
      requests: {cpu: 100m, memory: 256Mi}
      limits:   {cpu: 500m, memory: 512Mi}
  chatbot:
    enabled: true
    replicas: 1
    resources:
      requests: {cpu: 100m, memory: 256Mi}
      limits:   {cpu: 500m, memory: 512Mi}
  giftFinder:
    enabled: true
    replicas: 1
    resources:
      requests: {cpu: 100m, memory: 256Mi}
      limits:   {cpu: 500m, memory: 512Mi}

# =============================================================================
# SupportBot — `support-bot` namespace
# =============================================================================
supportbot:
  web:
    enabled: true
    replicas: 1
    resources: {requests: {cpu: 100m, memory: 256Mi}, limits: {cpu: 500m, memory: 512Mi}}
  router:
    enabled: true
    replicas: 1
    resources: {requests: {cpu: 100m, memory: 256Mi}, limits: {cpu: 500m, memory: 512Mi}}
  billing:
    enabled: true
    replicas: 1
    resources: {requests: {cpu: 50m,  memory: 128Mi}, limits: {cpu: 250m, memory: 256Mi}}
  techSupport:
    enabled: true
    replicas: 1
    resources: {requests: {cpu: 50m,  memory: 128Mi}, limits: {cpu: 250m, memory: 256Mi}}
  accountManagement:
    enabled: true
    replicas: 1
    resources: {requests: {cpu: 50m,  memory: 128Mi}, limits: {cpu: 250m, memory: 256Mi}}

# =============================================================================
# Loadgen — `k6-loadgen` namespace
# =============================================================================
loadgen:
  enabled: true
  replicas: 1
  resources:
    requests: {cpu: 200m, memory: 256Mi}
    limits:   {cpu: 1000m, memory: 512Mi}
  # Behavior knobs (mirror LOADGEN.md env vars)
  ncTotalUsers: 200
  ncAiAdoptionRate: 0.25
  ncSessionsPerHour: 60
  sbTotalUsers: 30
  sbSessionsPerHour: 30
  pollOpenIntervalSec: 5
  timeOfDayCurve: false
  timezone: America/New_York
  sbUserDomain: acme.com
  # users.yaml content is generated by tools/regenerate-users.py and mounted
  # via ConfigMap. The install.sh wizard generates it before helm install.
  usersYamlPath: config/users.yaml

# =============================================================================
# Optional Ingress for exposing neoncart-web + supportbot-web at public hostnames.
# =============================================================================
# Off by default. Enable when you have an Ingress controller (Traefik, nginx,
# etc.) and DNS pointing at it. Each host can be left blank to skip — useful
# if you only want one of the two exposed.
ingress:
  enabled: false
  className: ""               # e.g. "traefik" or "nginx"
  annotations: {}             # cert-manager / ingress-controller specific
  neoncart:
    host: ""                  # e.g. neoncart.example.com
  supportbot:
    host: ""                  # e.g. supportbot.example.com
