{{- if .Values.neoncart.web.enabled }}
{{- /*
  users.yaml is generated by `tools/regenerate-users.py` and lives at
  `helm/config/users.yaml`. neoncart-web reads it at startup so its
  /api/whoami endpoint can hand the browser a random shopper identity —
  manual NeonCart sessions then look like loadgen sessions in Sigil
  (real emails, stable cohort assignments) rather than `shopper-xxxxxx`.

  Same fallback as the loadgen ConfigMap: empty skeleton so the pod
  doesn't crash-loop when users.yaml hasn't been generated yet.
*/}}
{{- $usersYaml := .Files.Get "config/users.yaml" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: neoncart-users
  namespace: neoncart
  labels:
    {{- include "aio11y.labels" "neoncart-web" | nindent 4 }}
data:
  users.yaml: |
{{- if $usersYaml }}
{{ $usersYaml | indent 4 }}
{{- else }}
    nc_users: []
    sb_users: []
{{- end }}
{{- end }}
