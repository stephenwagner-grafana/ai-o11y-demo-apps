{{- if .Values.neoncart.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neoncart-web
  namespace: neoncart
  labels:
    {{- include "aio11y.labels" "neoncart-web" | nindent 4 }}
spec:
  replicas: {{ .Values.neoncart.web.replicas }}
  selector:
    matchLabels:
      {{- include "aio11y.selectorLabels" "neoncart-web" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aio11y.labels" "neoncart-web" | nindent 8 }}
    spec:
      containers:
        - name: neoncart-web
          image: {{ include "aio11y.image" (list $ "neoncart-web") }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- include "aio11y.envOtelSigil" (list $ "neoncart-web") | nindent 12 }}
            {{- include "aio11y.envGatewayUrl" . | nindent 12 }}
            {{- include "aio11y.envPostgres" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.neoncart.web.resources | nindent 12 }}
{{- end }}
