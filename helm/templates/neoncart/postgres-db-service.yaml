{{- if .Values.neoncart.postgresDb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  namespace: neoncart
  labels:
    {{- include "aio11y.labels" "postgres-db" | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "aio11y.selectorLabels" "postgres-db" | nindent 4 }}
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
{{- end }}
