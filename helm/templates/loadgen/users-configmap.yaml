{{- if .Values.loadgen.enabled }}
{{- /*
  users.yaml is generated by `tools/regenerate-users.py` BEFORE `helm install`
  and lives at the chart root as `config/users.yaml`. The orchestrator reads
  it at startup; cohort assignments are stable across regenerations.

  If the file is missing (e.g. install.sh wasn't run yet, or the helm chart
  was rendered against a fresh clone), we fall back to a tiny empty skeleton
  so the loadgen Deployment doesn't crash-loop on `yaml.safe_load`. The
  orchestrator handles empty cohorts gracefully (logs a warning, skips
  spawning K6 for empty cohorts).

  Visible warning is left in the ConfigMap data so it shows up in
  `kubectl describe cm loadgen-users`.
*/}}
{{- $usersYaml := .Files.Get "config/users.yaml" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: loadgen-users
  namespace: k6-loadgen
  labels:
    {{- include "aio11y.labels" "loadgen" | nindent 4 }}
data:
  users.yaml: |
{{- if $usersYaml }}
{{ $usersYaml | indent 4 }}
{{- else }}
    # WARNING: empty users.yaml — generate with tools/regenerate-users.py
    # (e.g. `python tools/regenerate-users.py --seed 42 > helm/config/users.yaml`)
    # then re-run `helm upgrade`. Until then loadgen runs with an empty user
    # pool and only the orchestrator's /health + /metrics endpoints are useful.
    nc_users: []
    sb_users: []
{{- end }}
{{- end }}
