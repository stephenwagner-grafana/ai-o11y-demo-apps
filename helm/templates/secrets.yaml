{{/*
Secrets created once per relevant namespace.
Values come from --set / --values overrides — never committed.

Namespaces that need Sigil/OTel secrets: every namespace that runs a pod
emitting telemetry — i.e. all 5.

Namespaces that need provider API keys: only llm-gateway (the gateway is
the sole caller of provider SDKs).

Namespaces that need Postgres creds: ai-o11y-postgres (server),
neoncart (apps that query), support-bot (RAG queries from sb-tech-support).
*/}}

{{- range list "k6-loadgen" "neoncart" "support-bot" "ai-o11y-postgres" "llm-gateway" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: aio11y-sigil
  namespace: {{ . }}
  labels:
    app.kubernetes.io/part-of: ai-o11y-demo-apps
type: Opaque
stringData:
  endpoint: {{ $.Values.global.sigil.endpoint | quote }}
  protocol: {{ $.Values.global.sigil.protocol | quote }}
  authMode: {{ $.Values.global.sigil.authMode | quote }}
  tenantId: {{ $.Values.global.sigil.tenantId | quote }}
  token:    {{ $.Values.global.sigil.token    | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: aio11y-otel
  namespace: {{ . }}
  labels:
    app.kubernetes.io/part-of: ai-o11y-demo-apps
type: Opaque
stringData:
  endpoint: {{ $.Values.global.otel.endpoint | quote }}
  headers:  {{ $.Values.global.otel.headers  | quote }}
{{- end }}

---
# Provider API keys live ONLY in the llm-gateway namespace.
apiVersion: v1
kind: Secret
metadata:
  name: aio11y-providers
  namespace: llm-gateway
  labels:
    app.kubernetes.io/part-of: ai-o11y-demo-apps
type: Opaque
stringData:
  anthropicApiKey: {{ .Values.global.anthropic.apiKey | quote }}
  openaiApiKey:    {{ .Values.global.openai.apiKey    | quote }}
  geminiApiKey:    {{ .Values.global.gemini.apiKey    | quote }}
  ollamaBaseUrl:   {{ .Values.global.ollama.baseUrl   | quote }}

---
# Postgres creds — replicated to namespaces that need to connect.
# Password persistence:
#   - First install: use .Values.postgres.password if set, else generate random.
#   - Subsequent upgrades: read the password from the live Secret so postgres-0
#     (initialized once on the StatefulSet PVC) and rolled app pods stay in sync.
# Without the lookup, randAlphaNum re-runs on every `helm upgrade`, the Secret
# rotates, but postgres-0 keeps its original password baked into the PVC, so
# all apps + the seed-job lose auth.
{{- $existing := lookup "v1" "Secret" "ai-o11y-postgres" "aio11y-postgres" }}
{{- $pgPassword := "" }}
{{- if and $existing (hasKey ($existing.data | default dict) "password") }}
{{-   $pgPassword = index $existing.data "password" | b64dec }}
{{- else }}
{{-   $pgPassword = .Values.postgres.password | default (randAlphaNum 24) }}
{{- end }}
{{- range list "ai-o11y-postgres" "neoncart" "support-bot" }}
apiVersion: v1
kind: Secret
metadata:
  name: aio11y-postgres
  namespace: {{ . }}
  labels:
    app.kubernetes.io/part-of: ai-o11y-demo-apps
type: Opaque
stringData:
  database: {{ $.Values.postgres.database | quote }}
  user:     {{ $.Values.postgres.user     | quote }}
  password: {{ $pgPassword | quote }}
---
{{- end }}
