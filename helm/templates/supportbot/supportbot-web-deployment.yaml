{{- if .Values.supportbot.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: supportbot-web
  namespace: support-bot
  labels:
    {{- include "aio11y.labels" "supportbot-web" | nindent 4 }}
spec:
  replicas: {{ .Values.supportbot.web.replicas }}
  selector:
    matchLabels:
      {{- include "aio11y.selectorLabels" "supportbot-web" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aio11y.labels" "supportbot-web" | nindent 8 }}
    spec:
      containers:
        - name: supportbot-web
          image: {{ include "aio11y.image" (list $ "supportbot-web") }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- include "aio11y.envOtelSigil" (list $ "supportbot-web") | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.supportbot.web.resources | nindent 12 }}
{{- end }}
