# Mirror of Sigil's canonical LLM pricing data.
#
# Sigil owns canonical pricing but does not (as of 2026-05-22) emit a
# Prom cost metric or expose a public pricing API. This file is the
# stopgap. When Sigil ships either, delete this file and switch
# gateway/app/pricing.py to query Sigil instead.
#
# Customer can override individual rates via env vars, e.g.
#   ANTHROPIC_SONNET_OUTPUT_USD_PER_MTOKEN=15.00
# Useful for negotiated-discount customers.
#
# All rates are USD per 1,000,000 tokens.

anthropic:
  # Opus tier — $15/Mtok input, $75/Mtok output
  claude-opus-4-7:
    input_usd_per_mtoken: 15.00
    output_usd_per_mtoken: 75.00
  claude-opus-4-6:
    input_usd_per_mtoken: 15.00
    output_usd_per_mtoken: 75.00
  claude-opus-4-1:
    input_usd_per_mtoken: 15.00
    output_usd_per_mtoken: 75.00
  # Sonnet tier — $3/Mtok input, $15/Mtok output
  claude-sonnet-4-6:
    input_usd_per_mtoken: 3.00
    output_usd_per_mtoken: 15.00
  claude-sonnet-4-5:
    input_usd_per_mtoken: 3.00
    output_usd_per_mtoken: 15.00
  # Haiku tier — $1/Mtok input, $5/Mtok output
  claude-haiku-4-5-20251001:
    input_usd_per_mtoken: 1.00
    output_usd_per_mtoken: 5.00
  claude-haiku-4-5:
    input_usd_per_mtoken: 1.00
    output_usd_per_mtoken: 5.00

