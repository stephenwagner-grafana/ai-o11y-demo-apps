version: 2

updates:
  # GitHub Actions itself
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

  # Python deps — one entry per requirements.txt directory.
  - package-ecosystem: pip
    directory: /gateway
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - python

  - package-ecosystem: pip
    directory: /apps/neoncart-web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - python

  - package-ecosystem: pip
    directory: /apps/neoncart-chatbot
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - python

  - package-ecosystem: pip
