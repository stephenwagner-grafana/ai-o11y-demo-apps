name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same branch/PR when a new push lands.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}

jobs:
  build:
    name: build ${{ matrix.component.name }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        component:
          - name: gateway
            context: gateway
            image: gateway
          - name: neoncart-web
            context: apps/neoncart-web
            image: neoncart-web
          - name: neoncart-chatbot
            context: apps/neoncart-chatbot
            image: neoncart-chatbot
          - name: neoncart-gift-finder
            context: apps/neoncart-gift-finder
            image: neoncart-gift-finder
          - name: supportbot-web
            context: apps/supportbot-web
            image: supportbot-web
          - name: supportbot-router
            context: apps/supportbot-router
            image: supportbot-router
          - name: supportbot-billing
            context: apps/supportbot-billing
            image: supportbot-billing
          - name: supportbot-tech-support
            context: apps/supportbot-tech-support
            image: supportbot-tech-support
          - name: supportbot-account-management
            context: apps/supportbot-account-management
            image: supportbot-account-management
          - name: postgres-seed-loader
            context: postgres/seed-loader
            image: postgres-seed-loader
          - name: loadgen
            context: loadgen
            image: loadgen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Skip components whose context directory doesn't exist yet (e.g. loadgen,
      # postgres-seed-loader are being added by another agent). Avoids hard
      # failures while the repo is in flight.
      - name: Check context exists
        id: context_check
        run: |
          if [ -f "${{ matrix.component.context }}/Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping ${{ matrix.component.name }} — ${{ matrix.component.context }}/Dockerfile not found yet."
          fi

      - name: Set up QEMU
        if: steps.context_check.outputs.exists == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.context_check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.context_check.outputs.exists == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        if: steps.context_check.outputs.exists == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.component.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch,enable=${{ github.ref != format('refs/heads/{0}', 'main') }}
            type=ref,event=pr
            type=sha,format=short,prefix=sha-

      - name: Build and push
        if: steps.context_check.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.context }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          # PRs build to validate the Dockerfile but do not push.
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component.image }}
          provenance: false
